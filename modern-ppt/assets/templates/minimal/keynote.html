<!DOCTYPE html>
<html>
<head>
<style>
/* Minimal Style Template - Maximum whitespace, typography-focused */
html { background: #FFFFFF; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: #FFFFFF;
  font-family: Arial, sans-serif;
}
.container {
  padding: 80pt;
}
.main-title {
  color: #09090B;
  font-size: 48pt;
  font-weight: bold;
  margin: 0 0 24pt 0;
  line-height: 1.1;
}
.accent-text {
  color: #2563EB;
}
.subtitle {
  color: #71717A;
  font-size: 18pt;
  margin: 0 0 48pt 0;
  line-height: 1.5;
  max-width: 480pt;
}
.divider {
  width: 60pt;
  height: 3pt;
  background: #2563EB;
  margin-bottom: 24pt;
}
.meta {
  display: flex;
  gap: 32pt;
}
.meta-item p {
  margin: 0;
}
.meta-label {
  color: #A1A1AA;
  font-size: 10pt;
  text-transform: uppercase;
  letter-spacing: 1pt;
  margin-bottom: 4pt;
}
.meta-value {
  color: #18181B;
  font-size: 14pt;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="container">
  <h1 class="main-title">MAIN_MESSAGE</h1>
  <div class="divider"></div>
  <p class="subtitle">SUPPORTING_TEXT</p>
  <div class="meta">
    <div class="meta-item">
      <p class="meta-label">LABEL_1</p>
      <p class="meta-value">VALUE_1</p>
    </div>
    <div class="meta-item">
      <p class="meta-label">LABEL_2</p>
      <p class="meta-value">VALUE_2</p>
    </div>
    <div class="meta-item">
      <p class="meta-label">LABEL_3</p>
      <p class="meta-value">VALUE_3</p>
    </div>
  </div>
</div>
</body>
</html>
